# ── Novo Financiamento Core ───────────────────────────────────────────────────
# Encaixe de novo empréstimo bancário (fora do hub) com mês e montante editáveis.
# O valor entra no fluxo_financiamento do mês configurado (desembolso único).
# Para cenário com projeto (hub_on=True), usar montante_com_projeto.
novo_financiamento_core:
