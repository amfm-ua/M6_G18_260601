# taxa_nominal = (1 + inflação_ano) × (1 + spread_real) − 1
#
# Inflação por ano (de macro.yaml): 2030-2034 = 1.5% a.a.
#
# Exemplo: spread_real=1.5% em 2030 → nominal = 1.015×1.015−1 ≈ 3.0%

