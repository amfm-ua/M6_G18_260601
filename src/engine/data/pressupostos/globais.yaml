triggers: {}

# ── Imposto do Selo sobre Financiamento ──────────────────────────────────────
# Verba 17.3.1 CIRS: selo sobre juros de financiamento (gasto do período).
# Ancoragem R&C 2024: 1.719,14 € / 42.978,56 € = 4,00%.
# Verba 17.1 CIRS: selo sobre utilização de crédito (por prazo).
# NÃO consta dos R&C → estimativa, toggle separado.
imposto_selo:
  taxa_juros: 0.04                      # Verba 17.3.1 — CONFIRMADO R&C 2024
  aplicar_juros: true                   # toggle principal
  # Utilização de crédito (Verba 17.1): estimativa (não auditado nos R&C)
  taxa_utilizacao_credito_longo: 0.006  # ≥5 anos (padrão legal)
  taxa_utilizacao_credito_curto: 0.0004 # 0,04%/mês (linha rotativa CP)
  aplicar_utilizacao: false             # default OFF — não suportado por R&C

# ── Política Financeira: Covenants e Gearing ─────────────────────────────────
covenants:
  # --- Covenants bancários contratuais (R&C 2024) → entram em covenants_todos_ok ---
  nd_ebitda_max: 3.5                  # ND/EBITDA ≤ 3,5× desde 2023
  autonomia_financeira_min: 0.30      # Autonomia Financeira Ajustada ≥ 30%, desde 2024
  # --- Política / estratégia de gestão → flags, NÃO breach contratual ---
  gearing_min: 0.40                   # piso estratégico (desalavancagem excessiva se abaixo)
  gearing_max: 0.65                   # teto estratégico
  autonomia_financeira_meta: 0.35     # buffer interno de gestão (soft, não contratual)
  # --- Métricas informativas (calcular, NÃO vinculativas) ---
  dscr_min: null                      # Grestel não tem DSCR contratual
  cobertura_juros_min: 2.0            # referência analítica

# ── Risco de Taxa de Juro (Euribor) ──────────────────────────────────────────
risco_taxa:
  euribor_choque_bps: 0             # choque em pontos base (ex: 200 = +2pp)
  aplica_a_taxa_variavel: true      # se false, sem efeito mesmo com choque != 0
  pct_divida_variavel: 1.0          # fracção da dívida base exposta a taxa variável
  # Nota: sizing dinâmico ao gearing-alvo requer solver iterativo — trabalho futuro.
  # Usar covenants.headroom_divida() para estimar o headroom face ao teto estratégico.

# ── Parâmetros de Financiamento ──────────────────────────────────────────────
financiamento:
  # Run-off contratual 2030-2034 (default OFF: dívida constante = constant leverage).
  # Com OFF: maturidade usa dívida de 2029 → WACC estável → Gordon limpo.
  # Com ON: BPI amortiza até 2032 → desalavancagem progressiva → ver impacto no gearing.
  # ⚠ Combinar com terminal_cash_sweep pode empurrar gearing abaixo de 40%.
  terminal_debt_runoff: false

# ── Novo Financiamento Core ───────────────────────────────────────────────────
# Encaixe de novo empréstimo bancário (fora do hub) com mês e montante editáveis.
# O valor entra no fluxo_financiamento do mês configurado (desembolso único).
# Para cenário com projeto (hub_on=True), usar montante_com_projeto.
novo_financiamento_core:
  mes_desembolso: Jan             # mês do desembolso (Jan por defeito)
  montante_sem_projeto: 1130000   # €1.130.000 — cenário sem hub
  montante_com_projeto: 1130000   # igual por defeito; ajustar se hub exigir financiamento adicional
